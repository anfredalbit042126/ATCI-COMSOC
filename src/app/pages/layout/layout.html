<section class="layout">

    <!-- ==================================================
         Sidebar
    ================================================== -->

    <aside class="sidebar">

        <!-- Logo -->

        <a
            class="logo"
            routerLink="/">

            <img
                src="/images/comsoc-logo.png"
                alt="Com Soc">

        </a>


        <!-- Navigation -->

        <ul class="nav-links">


            <!-- Dashboard -->

            <li>

                <a
                    routerLink="/"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">

                    🏠 Dashboard

                </a>

            </li>


            <!-- Members (Everyone) -->

            <li>

                <a
                    routerLink="/member"
                    routerLinkActive="active">

                    👥 Members

                </a>

            </li>


            <!-- Officers (Admin Only) -->

            <li *ngIf="isAdmin()">

                <a
                    routerLink="/officer"
                    routerLinkActive="active">

                    👮 Officers

                </a>

            </li>


            <!-- Logout -->

            <li>

                <a
                    href="#"
                    (click)="logout(); $event.preventDefault()">

                    🚪 Logout

                </a>

            </li>


        </ul>

    </aside>


    <!-- ==================================================
         Main Content
    ================================================== -->

    <div class="content">

        <main>

            <router-outlet></router-outlet>

        </main>

    </div>


</section>

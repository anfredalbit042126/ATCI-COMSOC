<section class="login-container">


    <!-- ==================================================
         Login Card
    ================================================== -->

    <div class="login-card">


        <!-- Header -->

        <div class="login-header">

            <h1>
                COMSOC
            </h1>


            <p class="subtitle">
                Organization Management System
            </p>

        </div>



        <!-- Login Form -->

        <div class="form">


            <h2>
                Login
            </h2>


            <input
                type="password"
                maxlength="6"
                inputmode="numeric"
                placeholder="Enter 6 Digit PIN"
                [(ngModel)]="pin"
            >



            <button
                (click)="login()">

                Login

            </button>


        </div>


    </div>


</section>

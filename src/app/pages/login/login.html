<div class="login-container">


    <div class="login-card">


        <h1>
            COMSOC
        </h1>


        <p class="subtitle">
            Organization Management System
        </p>



        <h2>
            Login
        </h2>



        <div class="form">


            <input
                type="password"
                maxlength="6"
                inputmode="numeric"
                placeholder="Enter 6 Digit PIN"
                [(ngModel)]="pin"
            >



            <button
                (click)="login()"
            >

                Login

            </button>


        </div>


    </div>


</div>
